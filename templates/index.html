<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>webscrvper — simple scraper</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <h1 class="mb-4">webscrvper</h1>
      <form method="post" action="/scrape" class="mb-3">
        <div class="input-group">
          <input name="url" class="form-control" placeholder="Enter URL (example: example.com or https://example.com)" required>
          <button class="btn btn-primary" type="submit">Scrape</button>
        </div>
      </form>

      <div class="card">
        <div class="card-body">
          <p class="mb-0">Enter a URL above and click <strong>Scrape</strong>. Results will include page title, paragraphs, and a list of links you can click to navigate and scrape further.</p>
        </div>
      </div>
    </div>
  </body>
</html>
